<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <header>
        <div>
            <div></div>
            <div></div>
            <div></div>
            <p>Revaiew</p>  
        </div>
        <nav>
            <ul>
                <a href="start.html ">HOME</a>
                <li><a href="discover.html">DISCOVER</a></li>
                <li>FILMS</li>
                <li id="special">SIGN IN</li>
            </ul>
        </nav>
    </header>
    <main>
        <div id="loginBoxContainer">
            <div id="loginBox" style="box-shadow: 0px 0px 15px red; border: solid 5px lightcoral;">
                <div>
                    <div></div>
                    <div></div>
                    <div></div>
                    <p>Revaiew - Login</p>
                </div> 
                <form id="userForm">
                    <input type="text" id="loginUsernameInput" placeholder="Enter Username">
                    <input type="password" id="loginPasswordInput" placeholder="Enter Password">
                    <input id="loginSubmit" type="button" value="Login">
                </form>
            </div>
        </div>
        <div id="signUpBoxContainer">
            <div id="signupBox" style="box-shadow: 0px 0px 15px rgb(214, 163, 22); border: solid 5px darkorange;">
                <div>
                    <div></div>
                    <div></div>
                    <div></div>
                    <p>Revaiew - Sign Up</p>
                </div> 
                <form id="userForm">
                    <input type="text" id="signUpUsernameInput" placeholder="Enter Username">
                    <input type="password" id="signUpPasswordInput" placeholder="Enter Password">
                    <input type="password" id="signUpPasswordInputconfirm" placeholder="Confirm Password">
                    <input id="signUpSubmit" type="button" value="Sign up">
                </form>
            </div>
        </div>
    </main>
    
    <script src="/javascript/frontend.js"></script>
    <script src="/javascript/login.js"></script>
    
</body>
</html>
