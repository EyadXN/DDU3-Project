<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/profile.css">
</head>

<body>
    <header>
    </header>
    <main>
        <div id="profileTop">
            <div id="profileImg"></div>
            <p id="welcomeMessage"></p>
        </div>
        <div id="myRating">
            <div></div>
            <p>My Rating</p>
        </div>
        <div id="oRating">
            <div></div>
            <p>overall Rating</p>
        </div>

        <div id="container">
            <div id="filter">
                <form id="my-form" action="">
                    <select name="category" id="category">
                        <option value="">Category</option>
                    </select>
                    <div>
                        <P>released before:</P>
                        <input class="release" type="text" name="releasedbefore">
                    </div>
                    <div>
                        <P>released after:</P>
                        <input class="release" type="text" name="releasedafter">
                    </div>
                    
                    <button id="filterButton">Filter</button>
                </form>
            </div>
            <div id="movieList">
                <h2>Movies you have reviewed</h2>
            </div>
        </div>

    </main>
    <script src="../javascript/frontend.js"></script>
    <script src="../javascript/profile.js"></script>
</body>

</html>
